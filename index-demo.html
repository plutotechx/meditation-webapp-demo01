<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Update Daily Meditation</title>
  <style>
    :root{
      --bg:#0b1220; --card:rgba(255,255,255,.08); --border:rgba(255,255,255,.12);
      --text:#eaf0ff; --muted:rgba(234,240,255,.75); --input:rgba(0,0,0,.22);
      --btn:#6aa9ff; --btnText:#081122; --danger:#ff6a6a; --ok:#65ffb3; --radius:18px;
      --overlay: rgba(0,0,0,.55);
      --card-bg: rgba(40,52,62,.35);
      --card-border: rgba(255,255,255,.28);
      --green: #21b14b;
      --tint-ok: rgba(101,255,179,.16);
      --tint-bad: rgba(255,106,106,.16);
      --tint-border-ok: rgba(101,255,179,.34);
      --tint-border-bad: rgba(255,106,106,.34);
    }
    *{box-sizing:border-box}
    body{font-family:system-ui,-apple-system,"Segoe UI",sans-serif;margin:0;background:var(--bg);color:var(--text)}
    .wrap{max-width:820px;margin:0 auto;padding:24px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
    .headerCenter{text-align:center;display:grid;gap:6px;margin-bottom:16px;}
    h1{margin:0;font-size:22px}
    .muted{color:var(--muted);margin:0;line-height:1.55}
    #weekHeader{margin:0;color:rgba(234,240,255,.78);font-weight:800;}
    label{display:block;margin:12px 0 6px}
    select,input{width:100%;border-radius:14px;border:1px solid rgba(255,255,255,.18);background:var(--input);color:#fff;padding:12px 12px;outline:none}
    select option:disabled{ color:rgba(234,240,255,.35); }
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media(min-width:760px){ .grid{grid-template-columns:1fr 1fr} }
    button{margin-top:14px;width:100%;padding:12px 14px;border:0;border-radius:14px;background:var(--btn);color:var(--btnText);font-weight:800;cursor:pointer}
    button:disabled{opacity:.6;cursor:not-allowed}
    .msg{margin-top:12px;min-height:22px;white-space:pre-line}
    .msg.ok{color:var(--ok)}
    .msg.bad{color:var(--danger)}
    .small{font-size:12px;color:var(--muted);margin-top:10px;text-align:center;}
    a.linkbtn{display:block;text-decoration:none}
    a.linkbtn button{margin-top:10px;background:rgba(255,255,255,.10);color:var(--text);border:1px solid rgba(255,255,255,.14)}

    /* ===== STATUS BAR ===== */
    #statusBar{
      margin: 10px 0 4px;
      overflow: hidden;
      transition: max-height .35s ease, opacity .3s ease;
      max-height: 0; opacity: 0;
    }
    #statusBar.visible{ max-height: 300px; opacity: 1; }
    .status-boxes{
      display: grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap: 8px; padding: 4px 0 10px;
    }
    @media(max-width:559px){ .status-boxes{ grid-template-columns: repeat(2,1fr); } }
    .sbox{
      border-radius: 14px; border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.18); padding: 10px 8px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 6px; text-align: center; min-height: 86px;
    }
    .sbox.ok{ background: linear-gradient(180deg, var(--tint-ok), rgba(0,0,0,.14)); border-color: var(--tint-border-ok); }
    .sbox.bad{ background: linear-gradient(180deg, var(--tint-bad), rgba(0,0,0,.14)); border-color: var(--tint-border-bad); }
    .sbox.loading{ background: rgba(255,255,255,.04); border-color: rgba(255,255,255,.08); }
    .sbox-title{font-size:12px;font-weight:800;color:rgba(234,240,255,.85);letter-spacing:.2px;}
    .sbox-time{font-size:11px;font-weight:700;color:rgba(234,240,255,.6);}
    .sbox-sum-count{font-size:26px;font-weight:1000;line-height:1;color:rgba(234,240,255,.95);}
    .sbox-sum-count.all{color:var(--ok);}
    .sbox-sum-count.none{color:var(--danger);}
    .sbox-sum-label{font-size:11px;font-weight:700;color:rgba(234,240,255,.6);}

    /* prefetch dot */
    #prefetchDot{
      display:inline-block;width:6px;height:6px;border-radius:50%;
      background:rgba(255,255,255,.2);margin-left:6px;transition:background .3s;
    }
    #prefetchDot.loading{ background:#f5c542; animation:pulse .8s infinite alternate; }
    #prefetchDot.ready{   background:#65ffb3; }
    #prefetchDot.error{   background:#ff6a6a; }
    @keyframes pulse{from{opacity:.4}to{opacity:1}}

    .shimmer{
      width:100%;height:12px;border-radius:6px;
      background:linear-gradient(90deg,rgba(255,255,255,.06) 25%,rgba(255,255,255,.13) 50%,rgba(255,255,255,.06) 75%);
      background-size:200% 100%; animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ===== Success Popup ===== */
    .success-overlay{position:fixed;inset:0;display:none;place-items:center;background:var(--overlay);z-index:9999;}
    .success-overlay.is-open{display:grid;animation:overlayIn .18s ease-out forwards;}
    @keyframes overlayIn{from{opacity:0}to{opacity:1}}
    .success-card{
      width:min(520px,86vw);height:min(280px,46vh);border-radius:10px;
      background:linear-gradient(180deg,rgba(54,74,86,.35),rgba(25,33,41,.40));
      border:1px solid var(--card-border);
      box-shadow:0 18px 55px rgba(0,0,0,.55),inset 0 0 0 1px rgba(255,255,255,.05);
      backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
      position:relative;overflow:hidden;
      display:grid;place-items:center;padding:24px;
      transform:translateY(6px) scale(.985);opacity:0;
      animation:cardIn .22s ease-out forwards;
    }
    @keyframes cardIn{to{transform:translateY(0) scale(1);opacity:1;}}
    .success-card::before{content:"";position:absolute;top:-10px;right:80px;width:170px;height:18px;background:radial-gradient(closest-side,rgba(135,200,255,.95),rgba(135,200,255,.25) 55%,rgba(135,200,255,0) 75%);filter:blur(1.2px);opacity:.9;pointer-events:none;}
    .success-card::after{content:"";position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:210px;height:20px;background:radial-gradient(closest-side,rgba(135,200,255,.85),rgba(135,200,255,.25) 55%,rgba(135,200,255,0) 78%);filter:blur(1.4px);opacity:.85;pointer-events:none;}
    .success-content{text-align:center;display:grid;gap:18px;justify-items:center;transform:translateY(-4px);}
    .success-icon{width:86px;height:86px;border-radius:999px;background:var(--green);display:grid;place-items:center;box-shadow:0 14px 30px rgba(33,177,75,.25);}
    .success-text{font-size:clamp(22px,2.6vw,30px);font-weight:600;color:var(--text);letter-spacing:.2px;text-shadow:0 2px 18px rgba(0,0,0,.45);margin:0;}

    /* ===== All Done Popup ===== */
    #allDoneOverlay{
      position:fixed;inset:0;display:none;place-items:center;
      background:rgba(0,0,0,.6);z-index:10000;
      animation:overlayIn .2s ease-out forwards;
    }
    #allDoneOverlay.is-open{ display:grid; }
    .alldone-card{
      width:min(460px,88vw);border-radius:24px;
      background:linear-gradient(160deg,rgba(20,40,30,.85),rgba(10,20,15,.9));
      border:1px solid rgba(101,255,179,.3);
      box-shadow:0 20px 60px rgba(0,0,0,.6), 0 0 40px rgba(101,255,179,.08);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      padding:36px 32px 28px;text-align:center;
      display:grid;gap:16px;justify-items:center;
      transform:translateY(8px) scale(.97);opacity:0;
      animation:cardIn .28s .05s ease-out forwards;
    }
    .alldone-emoji{ font-size:56px;line-height:1;filter:drop-shadow(0 4px 16px rgba(101,255,179,.3)); }
    .alldone-title{ font-size:clamp(20px,3vw,26px);font-weight:800;color:var(--ok);margin:0;letter-spacing:.3px; }
    .alldone-sub{ font-size:clamp(13px,1.8vw,15px);color:rgba(234,240,255,.65);margin:0;line-height:1.6; }
    .alldone-btn{
      margin-top:8px;padding:11px 32px;border:0;border-radius:14px;
      background:var(--ok);color:#061a10;font-weight:800;font-size:15px;
      cursor:pointer;width:auto;transition:opacity .2s;
    }
    .alldone-btn:hover{ opacity:.85; }

    /* ===== Greeting Splash ===== */
    #greetSplash{
      position:fixed;inset:0;z-index:19999;
      display:grid;place-items:center;
      background:rgba(11,18,32,.82);
      backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
      animation:splashIn .3s ease-out forwards;
    }
    #greetSplash.hide{
      animation:splashOut .5s ease-in forwards;
      pointer-events:none;
    }
    @keyframes splashIn{from{opacity:0}to{opacity:1}}
    @keyframes splashOut{from{opacity:1}to{opacity:0}}

    .greet-card{
      text-align:center; display:grid; gap:12px;
      padding:36px 40px; border-radius:24px;
      background:linear-gradient(160deg,rgba(50,66,80,.55),rgba(18,26,38,.6));
      border:1px solid rgba(255,255,255,.18);
      box-shadow:0 20px 60px rgba(0,0,0,.5);
      backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
      transform:translateY(-6px) scale(.97);opacity:0;
      animation:greetCardIn .35s .1s ease-out forwards;
      max-width: min(480px, 88vw);
    }
    @keyframes greetCardIn{to{transform:translateY(0) scale(1);opacity:1;}}
    .greet-emoji{ font-size:52px;line-height:1;filter:drop-shadow(0 4px 14px rgba(0,0,0,.4)); }
    .greet-msg{ font-size:clamp(22px,3.5vw,30px);font-weight:800;color:var(--text);margin:0;letter-spacing:.3px; }
    .greet-special{ font-size:clamp(13px,1.8vw,16px);font-weight:600;color:rgba(234,240,255,.65);margin:0; }
    .greet-date{ font-size:clamp(13px,1.8vw,15px);color:rgba(234,240,255,.5);margin:0;font-weight:500;letter-spacing:.2px; }
    .greet-sub{
      font-size:clamp(12px,1.6vw,14px);color:rgba(234,240,255,.45);margin:0;
      min-height:20px;transition:opacity .6s ease;
    }
    .greet-bar{
      width:0%;height:3px;border-radius:99px;
      background:linear-gradient(90deg,rgba(106,169,255,.8),rgba(101,255,179,.8));
      animation:greetBar var(--bar-dur,4.5s) .3s linear forwards;
      align-self:center;
    }
    @keyframes greetBar{from{width:0%}to{width:100%}}
  </style>
</head>

<body>

  <!-- ===== Greeting Splash ===== -->
  <div id="greetSplash">
    <div class="greet-card">
      <div class="greet-emoji" id="greetEmoji"></div>
      <p  class="greet-msg"     id="greetMsg"></p>
      <p  class="greet-special" id="greetSpecial" style="display:none"></p>
      <p  class="greet-date"    id="greetDate"></p>
      <p  class="greet-sub"     id="greetSub"></p>
      <div class="greet-bar"    id="greetBar"></div>
    </div>
  </div>

  <div class="wrap">
    <div class="card">
      <div class="headerCenter">
        <h1>Update Daily Meditation</h1>
        <p class="muted">บันทึกข้อมูลการทำสมาธิ</p>
        <p class="muted" id="weekHeader">กำลังคำนวณช่วงสัปดาห์...</p>
      </div>

      <form id="f">
        <label>ชื่อ - ชื่อเล่น <span id="prefetchDot" title="สถานะโหลดข้อมูลล่วงหน้า"></span></label>
        <select name="name" id="nameSel" required>
          <option value="">— เลือกชื่อ —</option>
          <option>สุรเชษฐ์ (ตั้ม)</option>
          <option>บัญญัติ (แดง)</option>
          <option>รัชเศรษฐ์ (ยศ)</option>
          <option>ชนุดม (ดอน)</option>
          <option>ทรงชัย (ทรง)</option>
          <option>สุรุ่งรัตน์ (เก่ง)</option>
          <option>อติพร (โอ)</option>
          <option>เกสณี (เก๋)</option>
          <option>สมภพ (เอก)</option>
          <option>ฐิตภรณ์ (เบลล์)</option>
          <option>อุมาพร (นก)</option>
          <option>ณัฐพล (ท๊อด)</option>
          <option>กิตติพงษ์ (พี)</option>
          <option>ธนพร (พร)</option>
          <option>รายาวดี (เฟริน)</option>
          <option>บัญญัติ (บอย)</option>
          <option>ธีรพล (ต้อม)</option>
          <option>นริศ (เอ็กซ์)</option>
          <option>กิตติ (ตี๋)</option>
          <option>จารุวรรณ (จุ๋ม)</option>
          <option>ณัฏฐา (เมย์)</option>
          <option>วรินทร (ต่อ)</option>
          <option>กิตติศักดิ์ (ใหม่)</option>
          <option>ราชัย (ชัย)</option>
          <option>รัญชนา (จีน่า)</option>
          <option>อรวรา (ผักแพว)</option>
          <option>ธนกฤษ (พิว)</option>
          <option>บุญฤทธิ์ (ใหม่)</option>
          <option>จิรายุทธ (ลีโอ)</option>
          <option>นนทชา (วิว)</option>
          <option>ยิ่งลักษณ์ (กุ้ง)</option>
          <option>ศราวุฒิ (บอล)</option>
          <option>นันทพงศ์ (โบ๊ท)</option>
          <option>ณัฐวุฒิ (เฟียส)</option>
          <option>กฤษดา (โจ)</option>
          <option>รณฤทธิ์ (เม่น)</option>
          <option>ธีรศักดิ์ (ต่าย)</option>
          <option>ณภัทร (ตัน)</option>
          <option>เอกพจน์ (เอก)</option>
        </select>

        <!-- ===== STATUS BAR ===== -->
        <div id="statusBar">
          <div class="status-boxes" id="statusBoxes"></div>
        </div>

        <div class="grid">
          <div>
            <label>วันที่บันทึก</label>
            <select id="logDate" name="logDate" required></select>
            <input type="hidden" id="weekdayHidden" name="weekday" value="">
          </div>
          <div>
            <label>ช่วงเวลา การทำสมาธิ</label>
            <select name="session" id="sessionSel" required>
              <option value="">— เลือกช่วง —</option>
              <option value="ครั้งที่ 1 / ตื่นนอน-เช้า">ครั้งที่ 1 / ตื่นนอน-เช้า</option>
              <option value="ครั้งที่ 2 / ระหว่างวัน">ครั้งที่ 2 / ระหว่างวัน</option>
              <option value="ครั้งที่ 3 / ก่อนนอน-ค่ำ">ครั้งที่ 3 / ก่อนนอน-ค่ำ</option>
            </select>
          </div>
        </div>

        <label>ระยะเวลาในการทำสมาธิ(แต่ละครั้ง)</label>
        <select name="duration" required>
          <option value="">— เลือกระยะเวลา —</option>
          <option>3-5 นาที</option>
          <option>10 นาที</option>
        </select>

        <button id="btn" type="submit">บันทึกข้อมูล</button>
        <a class="linkbtn" href="/status.html">
          <button type="button">ตรวจสอบสถานะการทำสมาธิ</button>
        </a>
        <div class="msg" id="msg"></div>
        <div class="small">หมายเหตุ: ตรวจสอบข้อมูลก่อนกดบันทึกข้อมูล</div>
      </form>
    </div>
  </div>

  <!-- Success Popup -->
  <div id="successOverlay" class="success-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="success-card">
      <div class="success-content">
        <div class="success-icon" aria-hidden="true">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none">
            <path d="M20 7L10.5 16.5L4 10" stroke="#fff" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <p id="successText" class="success-text">บันทึกข้อมูลเรียบร้อย</p>
      </div>
    </div>
  </div>

  <!-- All Done Popup -->
  <div id="allDoneOverlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="alldone-card">
      <div class="alldone-emoji">🧘</div>
      <p class="alldone-title">วันนี้คุณทำสมาธิครบแล้ว!</p>
      <p class="alldone-sub">ทำสมาธิครบ 3 ครั้งในวันนี้แล้ว<br>ขอบคุณที่ดูแลตัวเองทุกวัน 🙏</p>
      <button class="alldone-btn" id="allDoneCloseBtn">รับทราบ</button>
    </div>
  </div>

<script>
  // ===== DATE UTILS =====
  function pad2(n){ return String(n).padStart(2,"0"); }
  function toISODateLocal(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
  function thaiDateLabelLocal(d){ return d.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"}); }
  function mondayOfWeekLocal(d){
    const x=new Date(d); x.setHours(0,0,0,0);
    const day=x.getDay(), diff=(day===0)?-6:(1-day);
    x.setDate(x.getDate()+diff); return x;
  }
  function getTodayISO(){ return toISODateLocal(new Date()); }

  // ===== GREETING SPLASH =====
  const SKIP_GREET_KEY = "skipGreetOnce";
  const skipGreet = sessionStorage.getItem(SKIP_GREET_KEY) === "1";
  sessionStorage.removeItem(SKIP_GREET_KEY);

  (function(){
    const splash = document.getElementById("greetSplash");

    if(skipGreet){
      splash.remove();
      return;
    }

    const SPLASH_MS   = 5000;
    const PHASE2_MS   = 2500;

    const now  = new Date();
    const h    = now.getHours();
    const mm   = now.getMonth() + 1;
    const dd   = now.getDate();

    const SPECIAL = [
      { m:1,  d:1,  emoji:"🎆", msg:"สวัสดีปีใหม่!", sub:"Happy New Year" },
      { m:2,  d:14, emoji:"💝", msg:"สุขสันต์วันวาเลนไทน์", sub:"Happy Valentine's Day" },
      { m:4,  d:6,  emoji:"👑", msg:"วันจักรี", sub:"วันสถาปนาราชวงศ์จักรี" },
      { m:4,  d:13, emoji:"💦", msg:"สวัสดีปีใหม่ไทย!", sub:"สุขสันต์วันสงกรานต์" },
      { m:4,  d:14, emoji:"💦", msg:"สุขสันต์วันสงกรานต์", sub:"วันครอบครัว" },
      { m:4,  d:15, emoji:"💦", msg:"สุขสันต์วันสงกรานต์", sub:"วันผู้สูงอายุแห่งชาติ" },
      { m:5,  d:1,  emoji:"⚒️", msg:"สุขสันต์วันแรงงาน", sub:"Happy Labour Day" },
      { m:5,  d:4,  emoji:"👑", msg:"วันฉัตรมงคล", sub:"น้อมรำลึกในพระมหากรุณาธิคุณ" },
      { m:6,  d:3,  emoji:"👸", msg:"วันเฉลิมพระชนมพรรษา", sub:"สมเด็จพระนางเจ้าฯ พระบรมราชินี" },
      { m:7,  d:28, emoji:"👑", msg:"วันเฉลิมพระชนมพรรษา ร.10", sub:"ทรงพระเจริญ" },
      { m:8,  d:12, emoji:"💛", msg:"สุขสันต์วันแม่แห่งชาติ", sub:"Happy Mother's Day" },
      { m:10, d:13, emoji:"🌹", msg:"น้อมรำลึกในพระมหากรุณาธิคุณ", sub:"วันคล้ายวันสวรรคต ร.9" },
      { m:10, d:23, emoji:"🌹", msg:"วันปิยมหาราช", sub:"น้อมรำลึกพระมหากรุณาธิคุณ ร.5" },
      { m:12, d:5,  emoji:"💛", msg:"สุขสันต์วันพ่อแห่งชาติ", sub:"Happy Father's Day" },
      { m:12, d:10, emoji:"⚖️", msg:"วันรัฐธรรมนูญ", sub:"วันรัฐธรรมนูญแห่งราชอาณาจักรไทย" },
      { m:12, d:31, emoji:"🎉", msg:"ส่งท้ายปีเก่า!", sub:"สวัสดีปีใหม่ล่วงหน้า" },
    ];

    const TIME_GREET =
      h >= 5  && h < 12 ? { emoji:"🌅", msg:"อรุณสวัสดิ์" } :
      h >= 12 && h < 17 ? { emoji:"☀️", msg:"สวัสดีตอนบ่าย" } :
      h >= 17 && h < 21 ? { emoji:"🌆", msg:"สวัสดีตอนเย็น" } :
                          { emoji:"🌙", msg:"สวัสดีตอนดึก" };

    const special = SPECIAL.find(s => s.m === mm && s.d === dd);
    const emoji   = special ? special.emoji : TIME_GREET.emoji;
    const greetMsg = special ? special.msg  : TIME_GREET.msg;

    const THmonth = ["","มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                     "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
    const TH_DOW2 = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัสบดี","ศุกร์","เสาร์"];
    const dateStr = `วัน${TH_DOW2[now.getDay()]}ที่ ${dd} ${THmonth[mm]} พ.ศ. ${now.getFullYear()+543}`;

    const emojiEl   = document.getElementById("greetEmoji");
    const msgEl     = document.getElementById("greetMsg");
    const specialEl = document.getElementById("greetSpecial");
    const dateEl    = document.getElementById("greetDate");
    const subEl     = document.getElementById("greetSub");
    const barEl     = document.getElementById("greetBar");

    emojiEl.textContent = emoji;
    msgEl.textContent   = greetMsg;
    dateEl.textContent  = dateStr;
    subEl.textContent   = "";
    if(special && special.sub){
      specialEl.textContent = special.sub;
      specialEl.style.display = "";
    }

    barEl.style.setProperty("--bar-dur", (SPLASH_MS / 1000) + "s");

    const phase2Timer = setTimeout(() => {
      subEl.style.opacity = "0";
      setTimeout(() => {
        subEl.textContent = "⏳ กำลังเตรียมข้อมูล...";
        subEl.style.opacity = "1";
      }, 600);
    }, PHASE2_MS);

    function closeSplash(){
      clearTimeout(phase2Timer);
      splash.classList.add("hide");
      splash.addEventListener("animationend", () => splash.remove(), { once: true });
    }

    setTimeout(closeSplash, SPLASH_MS);
    splash.addEventListener("click", closeSplash);
  })();

  // ===== WEEK HEADER =====
  (function(){
    const now=new Date(), mon=mondayOfWeekLocal(now);
    const sun=new Date(mon); sun.setDate(mon.getDate()+6);
    document.getElementById("weekHeader").textContent=
      `จันทร์ ${thaiDateLabelLocal(mon)} – อาทิตย์ ${thaiDateLabelLocal(sun)}`;
  })();

  // ===== LOG DATE OPTIONS =====
  const logDateEl       = document.getElementById("logDate");
  const weekdayHiddenEl = document.getElementById("weekdayHidden");
  const TH_DOW = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];

  function buildLogDateOptions(){
    const now=new Date(), todayISO=getTodayISO(), mon=mondayOfWeekLocal(now);
    logDateEl.innerHTML="";
    for(let i=0;i<7;i++){
      const d=new Date(mon); d.setDate(mon.getDate()+i); d.setHours(0,0,0,0);
      const iso=toISODateLocal(d), dow=TH_DOW[d.getDay()];
      const base=`${dow} ${thaiDateLabelLocal(d)}`;
      const label=(iso===todayISO)?`${base} (วันนี้)`:base;
      const opt=document.createElement("option");
      opt.value=iso; opt.dataset.dow=dow;
      if(iso<todayISO){opt.disabled=true;opt.textContent=`${label} (ผ่านมาแล้ว)`;}
      else if(iso>todayISO){opt.disabled=true;opt.textContent=`${label} (ยังมาไม่ถึง)`;}
      else opt.textContent=label;
      logDateEl.appendChild(opt);
    }
    if([...logDateEl.options].some(o=>o.value===todayISO)) logDateEl.value=todayISO;
    else for(let i=0;i<logDateEl.options.length;i++){if(!logDateEl.options[i].disabled){logDateEl.selectedIndex=i;break;}}
    weekdayHiddenEl.value=logDateEl.selectedOptions[0]?.dataset?.dow||"";
  }
  logDateEl.addEventListener("change",()=>{ weekdayHiddenEl.value=logDateEl.selectedOptions[0]?.dataset?.dow||""; });
  buildLogDateOptions();

  // ===== PREFETCH ENGINE =====
  const dot = document.getElementById("prefetchDot");
  let prefetchCache   = null;
  let prefetchPromise = null;

  function setDot(state){ dot.className=""; dot.classList.add(state); }

  async function prefetchToday(bustCache = false){
    const logDate = getTodayISO();
    if(!bustCache && prefetchCache && prefetchCache.date === logDate) return prefetchCache;
    setDot("loading");
    try{
      const q = new URLSearchParams({ logDate });
      if(bustCache) q.set("_bust", Date.now().toString());
      const res = await fetch(`/api/prefetchToday?${q}`);
      const out = await res.json().catch(()=>({}));
      if(out.ok !== false && out.data){
        prefetchCache = { date: logDate, data: out.data };
        setDot("ready");
        return prefetchCache;
      } else {
        setDot("error");
        return null;
      }
    }catch(e){
      setDot("error");
      return null;
    }
  }

  prefetchPromise = prefetchToday();

  // ===== SESSION DROPDOWN =====
  const sessionSel = document.getElementById("sessionSel");

  const SESSION_KEYS = [
    { key:"s1", label:"ครั้งที่ 1 / ตื่นนอน-เช้า" },
    { key:"s2", label:"ครั้งที่ 2 / ระหว่างวัน"   },
    { key:"s3", label:"ครั้งที่ 3 / ก่อนนอน-ค่ำ"  },
  ];

  function updateSessionDropdown(sessionData){
    const prev = sessionSel.value;
    sessionSel.innerHTML = `<option value="">— เลือกช่วง —</option>`;
    SESSION_KEYS.forEach(({ key, label }) => {
      const st   = sessionData?.[key] || {};
      const done = st.mark === "✅" || st.done === true;
      const opt  = document.createElement("option");
      opt.value       = label;
      opt.textContent = done ? `${label}  ✅` : `${label}  ⏳`;
      opt.disabled    = done;
      sessionSel.appendChild(opt);
    });
    if(prev){
      const match = [...sessionSel.options].find(o => o.value === prev && !o.disabled);
      if(match) sessionSel.value = prev;
    }
  }

  function resetSessionDropdown(){
    sessionSel.innerHTML = `
      <option value="">— เลือกช่วง —</option>
      <option value="ครั้งที่ 1 / ตื่นนอน-เช้า">ครั้งที่ 1 / ตื่นนอน-เช้า</option>
      <option value="ครั้งที่ 2 / ระหว่างวัน">ครั้งที่ 2 / ระหว่างวัน</option>
      <option value="ครั้งที่ 3 / ก่อนนอน-ค่ำ">ครั้งที่ 3 / ก่อนนอน-ค่ำ</option>`;
  }

  // ===== STATUS BAR =====
  const statusBar   = document.getElementById("statusBar");
  const statusBoxes = document.getElementById("statusBoxes");
  const nameSel     = document.getElementById("nameSel");
  let fallbackAbort = null;
  let fallbackCache = {};
  let allDoneTimer  = null;

  function isDone(st){ return st?.mark==="✅" || st?.done===true; }

  function showStatusLoading(){
    statusBar.classList.add("visible");
    statusBoxes.innerHTML=`
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>
      <div class="sbox loading"><div class="shimmer"></div><div class="shimmer" style="width:60%;height:10px;margin-top:4px"></div></div>`;
  }

  function showStatusResult(data){
    const s1=data.sessions?.s1||{}, s2=data.sessions?.s2||{}, s3=data.sessions?.s3||{};
    const doneCount=data.doneCount??[s1,s2,s3].filter(isDone).length;

    function box(title,st){
      const ok=isDone(st), cls=ok?"ok":"bad";
      const icon=ok
        ?`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M20 7L10.5 16.5L4 10" stroke="#65ffb3" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`
        :`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M18 6L6 18M6 6l12 12" stroke="#ff6a6a" stroke-width="2.8" stroke-linecap="round"/></svg>`;
      const timeStr=(st.time&&st.time!=="—")?`<div class="sbox-time">${st.time} น.</div>`:`<div class="sbox-time">—</div>`;
      return `<div class="sbox ${cls}"><div class="sbox-title">${title}</div>${icon}${timeStr}</div>`;
    }
    const sumCls=doneCount===3?"all":doneCount===0?"none":"";
    const sumBox=`<div class="sbox"><div class="sbox-title">สรุป</div><div class="sbox-sum-count ${sumCls}">${doneCount}/3</div><div class="sbox-sum-label">${doneCount===3?"ครบแล้ว!":doneCount===0?"ยังไม่มี":"กำลังดี"}</div></div>`;
    statusBoxes.innerHTML=box("ครั้งที่ 1",s1)+box("ครั้งที่ 2",s2)+box("ครั้งที่ 3",s3)+sumBox;
    statusBar.classList.add("visible");

    updateSessionDropdown(data.sessions);

    clearTimeout(allDoneTimer);
    if(doneCount === 3){
      allDoneTimer = setTimeout(showAllDonePopup, 3000);
    }
  }

  function showStatusError(){
    statusBar.classList.add("visible");
    statusBoxes.innerHTML=`<div style="grid-column:1/-1;text-align:center;font-size:12px;color:rgba(234,240,255,.45);padding:8px 0;">ไม่สามารถโหลดสถานะได้</div>`;
  }

  function hideStatus(){
    statusBar.classList.remove("visible");
    statusBoxes.innerHTML="";
    clearTimeout(allDoneTimer);
    resetSessionDropdown();
  }

  async function fetchStatusFallback(name, logDate){
    const cacheKey=name+"|"+logDate;
    if(fallbackCache[cacheKey]){ showStatusResult(fallbackCache[cacheKey]); return; }
    if(fallbackAbort) fallbackAbort.abort();
    fallbackAbort=new AbortController();
    showStatusLoading();
    try{
      const q=new URLSearchParams({name,logDate});
      const res=await fetch(`/api/checkStatus?${q}`,{signal:fallbackAbort.signal});
      const out=await res.json().catch(()=>({}));
      if(out.ok!==false){ fallbackCache[cacheKey]=out; showStatusResult(out); }
      else showStatusError();
    }catch(e){ if(e.name==="AbortError")return; showStatusError(); }
  }

  nameSel.addEventListener("change", async () => {
    const name = (nameSel.value || "").trim();
    if (!name) { hideStatus(); return; }

    const logDate = getTodayISO();
    showStatusLoading();

    if (prefetchCache && prefetchCache.date === logDate) {
      const personData = prefetchCache.data[name];
      showStatusResult(personData || {
        doneCount: 0,
        sessions: { s1:{mark:"—",time:""}, s2:{mark:"—",time:""}, s3:{mark:"—",time:""} }
      });
      return;
    }

    const timeout = new Promise(r => setTimeout(() => r(null), 2000));
    const pc = await Promise.race([prefetchPromise, timeout]);

    if (pc && pc.data && pc.date === logDate) {
      const personData = pc.data[name];
      showStatusResult(personData || {
        doneCount: 0,
        sessions: { s1:{mark:"—",time:""}, s2:{mark:"—",time:""}, s3:{mark:"—",time:""} }
      });
      return;
    }

    fetchStatusFallback(name, logDate);
  });

  // ===== ALL DONE POPUP =====
  const allDoneOverlay = document.getElementById("allDoneOverlay");
  const allDoneCloseBtn = document.getElementById("allDoneCloseBtn");

  function showAllDonePopup(){
    allDoneOverlay.classList.add("is-open");
    allDoneOverlay.setAttribute("aria-hidden","false");
  }
  function hideAllDonePopup(){
    allDoneOverlay.classList.remove("is-open");
    allDoneOverlay.setAttribute("aria-hidden","true");
  }
  allDoneCloseBtn.addEventListener("click", () => {
    // แค่ปิด popup ไม่ reload, ไม่ welcome ซ้ำ
    hideAllDonePopup();
  });

  // ===== SUCCESS POPUP =====
  (function(){
    const overlay=document.getElementById("successOverlay");
    const textEl=document.getElementById("successText");
    let autoTimer=null;
    const POPUP_MS=2500, REFRESH_AFTER_MS=4500;
    window.showSuccessPopup=function(message="บันทึกข้อมูลเรียบร้อย",ms=POPUP_MS){
      textEl.textContent=message;
      overlay.classList.add("is-open");
      overlay.setAttribute("aria-hidden","false");
      clearTimeout(autoTimer);
      autoTimer=setTimeout(window.hideSuccessPopup,ms);
    };
    window.hideSuccessPopup=function(){
      overlay.classList.remove("is-open");
      overlay.setAttribute("aria-hidden","true");
    };
    document.addEventListener("keydown",(e)=>{if(e.key==="Escape")window.hideSuccessPopup();});
    window.__POPUP_MS__=POPUP_MS;
    window.__REFRESH_AFTER_MS__=REFRESH_AFTER_MS;
  })();

  // ===== SUBMIT =====
  const form = document.getElementById("f");
  const btn  = document.getElementById("btn");
  const msg  = document.getElementById("msg");

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    btn.disabled=true;
    msg.className="msg";
    msg.textContent="กำลังบันทึกข้อมูล...";
    const fd=new FormData(form);
    const payload=Object.fromEntries(fd.entries());
    payload.clientNow=new Date().toISOString();
    payload.tzOffsetMin=new Date().getTimezoneOffset();
    try{
      const res=await fetch("/api/submit",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
      const out=await res.json().catch(()=>({}));
      if(res.ok&&out.ok){
        msg.className="msg ok";
        msg.textContent="บันทึกข้อมูลเรียบร้อย ✅";
        window.showSuccessPopup("บันทึกข้อมูลเรียบร้อย");
        sessionStorage.setItem(SKIP_GREET_KEY, "1");
        prefetchCache=null;
        prefetchPromise=prefetchToday(true);
        const selName=(nameSel.value||"").trim();
        delete fallbackCache[selName+"|"+getTodayISO()];
        form.reset();
        buildLogDateOptions();
        hideStatus();
        setTimeout(()=>location.reload(), window.__REFRESH_AFTER_MS__||4500);
      } else {
        msg.className="msg bad";
        msg.textContent="บันทึกไม่สำเร็จ ❌ "+(out.error||"unknown_error");
      }
    }catch(e){
      msg.className="msg bad";
      msg.textContent="บันทึกไม่สำเร็จ ❌ "+e;
    }finally{
      btn.disabled=false;
    }
  });
</script>
</body>
</html>
